<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO | Investment Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
            --blue-600: #2563eb; --blue-700: #1d4ed8;
            --green-600: #16a34a; --red-600: #dc2626;
            --panel-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-50); color: var(--slate-900); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--slate-900); color: white;
            padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center;
            height: 60px; flex-shrink: 0;
        }
        .logo-box h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.5px; }
        .status-pill { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-family: 'Roboto Mono'; }

        .market-bar {
            background: white; border-bottom: 1px solid var(--slate-200);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            padding: 0.5rem 2rem; height: 50px; flex-shrink: 0;
        }
        .market-stat { border-right: 1px solid var(--slate-200); padding: 0 15px; }
        .label { font-size: 0.6rem; color: var(--slate-700); text-transform: uppercase; font-weight: 700; }
        .value { font-family: 'Roboto Mono', monospace; font-weight: 600; font-size: 0.9rem; }

        .dashboard {
            display: grid; grid-template-columns: 350px 1fr 380px;
            gap: 1rem; padding: 1rem; flex: 1; overflow: hidden;
        }

        .panel { background: white; border: 1px solid var(--slate-200); border-radius: 6px; box-shadow: var(--panel-shadow); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .panel-header { padding: 10px 16px; background: var(--slate-100); border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 0.75rem; font-weight: 700; color: var(--slate-800); text-transform: uppercase; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 1rem; }
        
        .stock-card { border: 1px solid var(--slate-200); border-radius: 6px; margin-bottom: 0.75rem; transition: 0.2s; cursor: pointer; background: #fff; position: relative; }
        .stock-card:hover { border-color: var(--blue-600); background: var(--slate-50); }
        .stock-card.active { border-left: 4px solid var(--blue-600); background: #f0f7ff; }
        .card-inner { padding: 12px; pointer-events: none; }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-ticker { font-weight: 700; color: var(--blue-600); font-size: 1rem; }
        .group-tag { font-size: 0.6rem; background: var(--slate-200); padding: 2px 6px; border-radius: 10px; color: var(--slate-700); }

        .card-metrics { display: grid; grid-template-columns: 1fr 1fr; font-size: 0.75rem; color: var(--slate-700); row-gap: 4px; }

        .main-view { display: flex; flex-direction: column; gap: 1rem; height: 100%; }
        .chart-box { flex: 2; background: white; border: 1px solid var(--slate-200); border-radius: 6px; position: relative; min-height: 350px; }
        .analysis-box { flex: 1; background: white; border: 1px solid var(--slate-200); border-radius: 6px; overflow-y: auto; }

        .analysis-content { padding: 20px; line-height: 1.7; font-size: 0.95rem; color: var(--slate-800); }
        .analysis-text { white-space: pre-wrap; font-size: 0.9rem; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .data-table th { text-align: left; padding: 8px 12px; color: var(--slate-700); border-bottom: 2px solid var(--slate-200); }
        .data-table td { padding: 8px 12px; border-bottom: 1px solid var(--slate-100); }

        #sector-filter { padding: 4px; border-radius: 4px; border: 1px solid var(--slate-200); font-size: 0.7rem; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><h1>NEXUS INTELLIGENCE <span style="font-weight: 300; opacity: 0.6; margin-left: 10px;">PRO TERMINAL</span></h1></div>
    <div class="status-pill" id="sync-status">Syncing...</div>
</header>

<div class="market-bar">
    <div class="market-stat"><span class="label">Volatility (VIX)</span><div class="value" id="vix-val">--</div></div>
    <div class="market-stat"><span class="label">US 10Y Yield</span><div class="value" id="yield-val">--</div></div>
    <div class="market-stat"><span class="label">Risk Status</span><div class="value" id="risk-status">STABLE</div></div>
    <div class="market-stat"><span class="label">Avg Conviction</span><div class="value" id="conv-avg">--</div></div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="panel-header">
            <h3>Buffett Watchlist</h3>
            <select id="sector-filter" onchange="renderList()">
                <option value="ALL">Alles</option>
                <option value="Tech & AI">Tech & AI</option>
                <option value="Financials">Financials</option>
                <option value="Others">Overig</option>
            </select>
        </div>
        <div class="scroll-area" id="list-container"></div>
    </div>

    <div class="main-view">
        <div class="chart-box">
            <div id="tv-container" style="height: 100%; width: 100%;"></div>
        </div>
        <div class="analysis-box">
            <div class="panel-header"><h3>Fundamental Research & Margin of Safety</h3></div>
            <div id="full-analysis-content" class="analysis-content">Selecteer een aandeel...</div>
        </div>
    </div>

    <div class="main-view">
        <div class="panel" style="flex:1">
            <div class="panel-header"><h3>Active Positions</h3></div>
            <table class="data-table">
                <thead><tr><th>Asset</th><th>Current</th><th>P/L %</th></tr></thead>
                <tbody id="trades-list"></tbody>
            </table>
        </div>
        <div class="panel" style="flex:0.6">
            <div class="panel-header"><h3>Equity Curve</h3></div>
            <div style="padding:15px; height: 150px;"><canvas id="equityChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let equityChart = null;
    let globalData = null;

    async function loadData() {
        const res = await fetch('data.json?t=' + Date.now());
        globalData = await res.json();
        updateUI();
    }

    function updateUI() {
        document.getElementById('vix-val').innerText = globalData.macro.vix;
        document.getElementById('yield-val').innerText = globalData.macro.treasury_10y + '%';
        document.getElementById('sync-status').innerText = "REFRESH: " + new Date(globalData.generated_at).toLocaleTimeString();
        
        const risk = document.getElementById('risk-status');
        risk.innerText = globalData.macro.vix > 22 ? 'CAUTION' : 'STABLE';
        risk.style.color = globalData.macro.vix > 22 ? 'var(--red-600)' : 'var(--green-600)';

        renderList();
        renderTrades();
        renderEquityChart();
        
        if (globalData.top_candidates.length > 0) selectStock(globalData.top_candidates[0].ticker);
    }

    function renderList() {
        const filter = document.getElementById('sector-filter').value;
        const container = document.getElementById('list-container');
        
        container.innerHTML = globalData.top_candidates
            .filter(c => filter === "ALL" || c.industry_group === filter)
            .map(c => `
                <div class="stock-card" id="card-${c.ticker}" onclick="selectStock('${c.ticker}')">
                    <div class="card-inner">
                        <div class="card-top">
                            <span class="card-ticker">${c.ticker}</span>
                            <span class="group-tag">${c.industry_group || 'General'}</span>
                        </div>
                        <div class="card-metrics">
                            <div>ROE: <b>${c.roe}%</b></div>
                            <div>PE: <b>${c.pe_ratio}</b></div>
                            <div>Debt/Eq: <b>${c.debt_to_equity}</b></div>
                            <div>Score: <b>${c.score}/10</b></div>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    function renderTrades() {
        const list = document.getElementById('trades-list');
        list.innerHTML = (globalData.active_trades || []).map(t => `
            <tr><td><b>${t.ticker}</b></td><td>€${t.current_price}</td>
            <td style="color:${t.pl_percent >= 0 ? 'var(--green-600)' : 'var(--red-600)'}; font-weight:700">${t.pl_percent}%</td></tr>
        `).join('');
    }

    function selectStock(ticker) {
        const data = globalData.top_candidates.find(x => x.ticker === ticker);
        if(!data) return;

        document.querySelectorAll('.stock-card').forEach(el => el.classList.remove('active'));
        const activeCard = document.getElementById(`card-${ticker}`);
        if(activeCard) activeCard.classList.add('active');

        // TradingView
        let symbol = ticker.includes('.AS') ? `EURONEXT:${ticker.split('.')[0]}` : ticker;
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
            "theme": "light", "style": "1", "locale": "en", "container_id": "tv-container"
        });

        // Analyse Content (Tier 2 data)
        const analysisBox = document.getElementById('full-analysis-content');
        const claudeText = data.tier2?.analysis || `Geen uitgebreide analyse voor ${ticker}. ROE: ${data.roe}%.`;
        const targetPrice = data.tier2?.target_price || "N/A";

        analysisBox.innerHTML = `
            <div class="analysis-content">
                <h4 style="margin-bottom:10px; color:var(--blue-600)">Report: ${data.name}</h4>
                <div style="background:var(--slate-100); padding:10px; border-radius:4px; margin-bottom:15px; font-family:'Roboto Mono'; font-size:0.8rem">
                    Target: €${targetPrice.replace('€','')} | ROE: ${data.roe}% | PE: ${data.pe_ratio}
                </div>
                <div class="analysis-text">${claudeText}</div>
            </div>`;
    }

    function renderEquityChart() {
        const ctx = document.getElementById('equityChart').getContext('2d');
        if (equityChart) equityChart.destroy();
        equityChart = new Chart(ctx, {
            type: 'line',
            data: { labels: (globalData.equity_history || []).map(h => h.date), datasets: [{ data: (globalData.equity_history || []).map(h => h.value), borderColor: '#2563eb', tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { position: 'right' } } }
        });
    }

    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>
