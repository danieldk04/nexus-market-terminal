<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO | Investment Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
            --blue-600: #2563eb; --blue-700: #1d4ed8;
            --green-600: #16a34a; --red-600: #dc2626;
            --panel-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--slate-50); color: var(--slate-900); overflow: hidden; }

        header {
            background: var(--slate-900); color: white;
            padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center;
            height: 60px;
        }
        .logo-box h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.5px; }
        .status-pill { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-family: 'Roboto Mono'; }

        .market-bar {
            background: white; border-bottom: 1px solid var(--slate-200);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            padding: 0.5rem 2rem; height: 50px;
        }
        .market-stat { border-right: 1px solid var(--slate-200); padding: 0 15px; }
        .label { font-size: 0.6rem; color: var(--slate-700); text-transform: uppercase; font-weight: 700; }
        .value { font-family: 'Roboto Mono', monospace; font-weight: 600; font-size: 0.9rem; }

        .dashboard {
            display: grid; grid-template-columns: 350px 1fr 380px;
            gap: 1rem; padding: 1rem; height: calc(100vh - 110px);
        }

        .panel { background: white; border: 1px solid var(--slate-200); border-radius: 6px; box-shadow: var(--panel-shadow); display: flex; flex-direction: column; height: 100%; }
        .panel-header { padding: 10px 16px; background: var(--slate-100); border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 0.75rem; font-weight: 700; color: var(--slate-800); text-transform: uppercase; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 1rem; }
        
        .stock-card { 
            border: 1px solid var(--slate-200); 
            border-radius: 6px; 
            margin-bottom: 0.75rem; 
            transition: 0.2s; 
            cursor: pointer; 
            background: #fff; 
            position: relative;
            z-index: 1;
        }
        .stock-card:hover { border-color: var(--blue-600); background: var(--slate-50); }
        .stock-card.active { border-left: 4px solid var(--blue-600); background: #f0f7ff; }
        .card-inner { padding: 12px; pointer-events: none; } /* Zorgt dat de klik doorgegeven wordt naar de kaart */
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-ticker { font-weight: 700; color: var(--blue-600); font-size: 1rem; }
        
        .badge { padding: 2px 8px; border-radius: 3px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .badge-buy { background: #dcfce7; color: #166534; }
        .badge-hold { background: #fef9c3; color: #854d0e; }

        .card-metrics { display: grid; grid-template-columns: 1fr 1fr; font-size: 0.75rem; color: var(--slate-700); row-gap: 4px; }
        .metric-label { color: var(--slate-700); font-size: 0.65rem; text-transform: uppercase; font-weight: 600; margin-right: 4px; }

        .main-view { display: flex; flex-direction: column; gap: 1rem; height: 100%; }
        .chart-box { flex: 2; background: white; border: 1px solid var(--slate-200); border-radius: 6px; position: relative; min-height: 400px; }
        .analysis-box { flex: 1; background: white; border: 1px solid var(--slate-200); border-radius: 6px; overflow-y: auto; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .data-table th { text-align: left; padding: 8px 16px; color: var(--slate-700); border-bottom: 2px solid var(--slate-200); }
        .data-table td { padding: 10px 16px; border-bottom: 1px solid var(--slate-100); }
        
        .analysis-content { padding: 20px; line-height: 1.7; font-size: 0.95rem; color: var(--slate-800); }
        .analysis-content h4 { color: var(--blue-600); margin-bottom: 15px; border-bottom: 1px solid var(--slate-100); padding-bottom: 10px; font-size: 1.1rem; }
        .analysis-text { white-space: pre-wrap; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>NEXUS INTELLIGENCE <span style="font-weight: 300; opacity: 0.6; margin-left: 10px;">PRO TERMINAL</span></h1>
    </div>
    <div class="status-pill" id="last-update">Syncing...</div>
</header>

<div class="market-bar">
    <div class="market-stat"><span class="label">Volatility (VIX)</span><div class="value" id="vix-val">--</div></div>
    <div class="market-stat"><span class="label">US 10Y Yield</span><div class="value" id="yield-val">--</div></div>
    <div class="market-stat"><span class="label">Fear & Greed</span><div class="value" id="fg-val">--</div></div>
    <div class="market-stat"><span class="label">Risk Status</span><div class="value" id="risk-status">STABLE</div></div>
    <div class="market-stat"><span class="label">Avg Conviction</span><div class="value" id="conv-avg">--</div></div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="panel-header"><h3>Buffett Watchlist</h3></div>
        <div class="scroll-area" id="candidates-list"></div>
    </div>

    <div class="main-view">
        <div class="chart-box">
            <div id="tv-container" style="height: 100%; width: 100%;"></div>
        </div>
        <div class="analysis-box">
            <div class="panel-header"><h3>Fundamental Research</h3></div>
            <div id="full-analysis-content" class="analysis-content"></div>
        </div>
    </div>

    <div class="main-view">
        <div class="panel" style="flex:1">
            <div class="panel-header"><h3>Active Positions</h3></div>
            <table class="data-table">
                <thead><tr><th>Asset</th><th>Current</th><th>P/L %</th></tr></thead>
                <tbody id="trades-list"></tbody>
            </table>
        </div>
        <div class="panel" style="flex:0.6">
            <div class="panel-header"><h3>Equity Curve</h3></div>
            <div style="padding:15px; height: 150px;"><canvas id="equityChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let equityChart = null;
    let globalData = null;

    async function loadData() {
        try {
            const res = await fetch('data.json?v=' + Date.now());
            globalData = await res.json();
            updateUI(globalData);
        } catch (e) { console.error("Fout bij laden data:", e); }
    }

    function updateUI(data) {
        document.getElementById('vix-val').innerText = data.macro.vix;
        document.getElementById('yield-val').innerText = data.macro.treasury_10y + '%';
        document.getElementById('fg-val').innerText = data.fear_and_greed?.score || '50';
        document.getElementById('last-update').innerText = 'REFRESH: ' + new Date(data.generated_at).toLocaleTimeString();
        
        const risk = document.getElementById('risk-status');
        risk.innerText = data.macro.vix > 22 ? 'CAUTION' : 'STABLE';
        risk.style.color = data.macro.vix > 22 ? 'var(--red-600)' : 'var(--green-600)';

        const container = document.getElementById('candidates-list');
        container.innerHTML = data.top_candidates.map((c, index) => {
            const roeColor = c.roe > 20 ? 'var(--green-600)' : 'var(--slate-800)';
            const debtColor = c.debt_to_equity > 1.5 ? 'var(--red-600)' : 'var(--slate-800)';
            
            return `
            <div class="stock-card" onclick="selectStockByIndex(${index})" id="card-${index}">
                <div class="card-inner">
                    <div class="card-top">
                        <span class="card-ticker">${c.ticker}</span>
                        <span class="badge ${c.tier2?.recommended_action === 'BUY' ? 'badge-buy' : 'badge-hold'}">
                            ${c.tier2?.recommended_action || 'HOLD'}
                        </span>
                    </div>
                    <div class="card-metrics">
                        <div><span class="metric-label">PE:</span><b>${c.pe_ratio}</b></div>
                        <div><span class="metric-label">Conv:</span><b>${Math.min(c.tier2?.conviction_score || 5, 10)}/10</b></div>
                        <div><span class="metric-label">ROE:</span><b style="color:${roeColor}">${c.roe}%</b></div>
                        <div><span class="metric-label">Debt/Eq:</span><b style="color:${debtColor}">${c.debt_to_equity || '0.0'}</b></div>
                    </div>
                </div>
            </div>
        `}).join('');

        const list = document.getElementById('trades-list');
        list.innerHTML = data.active_trades.map(t => `
            <tr>
                <td><b>${t.ticker}</b></td>
                <td>€${t.current_price}</td>
                <td style="color:${t.pl_percent >= 0 ? 'var(--green-600)' : 'var(--red-600)'}; font-weight:700">${t.pl_percent}%</td>
            </tr>
        `).join('');

        renderEquityChart(data);

        const scores = data.top_candidates.map(c => Math.min(c.tier2?.conviction_score || 0, 10));
        const avg = (scores.reduce((a,b) => a+b, 0) / (scores.length || 1)).toFixed(1);
        document.getElementById('conv-avg').innerText = avg + '/10';

        if (data.top_candidates.length > 0) selectStockByIndex(0);
    }

    function selectStockByIndex(index) {
        const c = globalData.top_candidates[index];
        if (!c) return;

        // UI Highlighting
        document.querySelectorAll('.stock-card').forEach(el => el.classList.remove('active'));
        const activeCard = document.getElementById(`card-${index}`);
        if(activeCard) activeCard.classList.add('active');

        // Data Cleanup
        const rawTarget = c.tier2?.target_price || '—';
        const cleanTarget = rawTarget.replace(/€/g, '').trim();
        const cleanScore = Math.min(c.tier2?.conviction_score || 5, 10);

        // Analyse Injecteren
        const analysisBox = document.getElementById('full-analysis-content');
        analysisBox.innerHTML = `
            <div class="analysis-content" style="padding:0">
                <h4>Research Report: ${c.name} (${c.ticker})</h4>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; background: var(--slate-100); padding: 15px; border-radius: 6px; font-family: 'Roboto Mono'; font-size: 0.8rem;">
                    <div>TARGET: <b style="color:var(--blue-600)">€${cleanTarget}</b></div>
                    <div>ROE: <b>${c.roe}%</b></div>
                    <div>DEBT/EQ: <b>${c.debt_to_equity || '0.0'}</b></div>
                    <div>DIVIDEND: <b>${c.dividend_yield}%</b></div>
                </div>
                <div class="analysis-text">${c.tier2?.analysis || 'Geen analyse beschikbaar.'}</div>
            </div>`;

        // TradingView Update
        let symbol = c.ticker;
        if (symbol.includes('.AS')) symbol = `EURONEXT:${symbol.split('.')[0]}`;
        
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
            "theme": "light", "style": "1", "locale": "en", "container_id": "tv-container"
        });
    }

    function renderEquityChart(data) {
        const hist = data.equity_history || [];
        if (equityChart) equityChart.destroy();
        equityChart = new Chart(document.getElementById('equityChart'), {
            type: 'line',
            data: {
                labels: hist.map(h => h.date),
                datasets: [{ data: hist.map(h => h.value), borderColor: '#2563eb', fill: false, tension: 0.3, pointRadius: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { position: 'right' } } }
        });
    }

    loadData();
    setInterval(loadData, 60000);
</script>

</body>
</html>
