<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS PRO | Intelligence Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --accent: #2563eb; --text: #0f172a; --slate-200: #e2e8f0; --slate-700: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #0f172a; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        
        .market-bar { background: white; border-bottom: 1px solid var(--slate-200); display: grid; grid-template-columns: repeat(4, 1fr); padding: 5px 20px; height: 50px; }
        .market-stat { border-right: 1px solid var(--slate-200); padding: 0 10px; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; color: var(--slate-700); }
        .stat-value { font-family: 'Roboto Mono'; font-weight: 600; font-size: 0.85rem; }

        .dashboard { display: grid; grid-template-columns: 350px 1fr 350px; gap: 15px; padding: 15px; flex: 1; overflow: hidden; }
        .panel { background: var(--panel); border: 1px solid var(--slate-200); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; height: 100%; }
        .panel-header { padding: 12px; background: #f1f5f9; border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; align-items: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        
        #sector-filter { padding: 4px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 0.75rem; }

        .stock-card { border: 1px solid var(--slate-200); border-radius: 6px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; background: white; }
        .stock-card:hover { border-color: var(--accent); background: #f0f7ff; }
        .stock-card.active { border-left: 5px solid var(--accent); background: #eff6ff; }
        .stock-card * { pointer-events: none; }

        .ticker-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .ticker-name { font-weight: 700; color: var(--accent); font-size: 1rem; }
        .tags { display: flex; gap: 5px; }
        .tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .tag-group { background: #e2e8f0; color: #475569; }
        .tag-buy { background: #dcfce7; color: #166534; }
        .tag-hold { background: #fef9c3; color: #854d0e; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; font-size: 0.75rem; gap: 4px; color: #64748b; }
        .metrics-grid b { color: var(--text); }

        .main-view { display: flex; flex-direction: column; gap: 15px; }
        #tv-container { flex: 2; background: white; border-radius: 8px; border: 1px solid var(--slate-200); min-height: 350px; }
        .analysis-box { flex: 1; overflow-y: auto; background: white; border: 1px solid var(--slate-200); border-radius: 8px; }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .data-table td, .data-table th { padding: 8px; border-bottom: 1px solid var(--slate-200); text-align: left; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:700">NEXUS PRO <span style="font-weight:400; opacity:0.7">| Command Center</span></div>
    <div id="sync-status" style="font-family:'Roboto Mono'; font-size:0.7rem">Syncing...</div>
</header>

<div class="market-bar">
    <div class="market-stat"><div class="stat-label">VIX</div><div class="stat-value" id="vix-val">--</div></div>
    <div class="market-stat"><div class="stat-label">10Y Yield</div><div class="stat-value" id="yield-val">--</div></div>
    <div class="market-stat"><div class="stat-label">Risk</div><div class="stat-value" id="risk-status">--</div></div>
    <div class="market-stat"><div class="stat-label">Avg Conviction</div><div class="stat-value" id="conv-avg">--</div></div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="panel-header">
            <h3 style="margin:0; font-size:0.8rem">Watchlist</h3>
            <select id="sector-filter" onchange="renderList()">
                <option value="ALL">Alles</option>
                <option value="Tech & AI">Tech & AI</option>
                <option value="Financials">Financials</option>
                <option value="Others">Overig</option>
            </select>
        </div>
        <div class="scroll-area" id="list-container"></div>
    </div>

    <div class="main-view">
        <div id="tv-container"></div>
        <div class="analysis-box">
            <div class="panel-header"><h3 style="margin:0; font-size:0.8rem">Research & Margin of Safety</h3></div>
            <div id="analysis-content" style="padding:15px; font-size:0.9rem; line-height:1.6"></div>
        </div>
    </div>

    <div class="main-view">
        <div class="panel">
            <div class="panel-header"><h3 style="margin:0; font-size:0.8rem">Active Positions</h3></div>
            <table class="data-table"><tbody id="trades-list"></tbody></table>
        </div>
        <div class="panel">
            <div class="panel-header"><h3 style="margin:0; font-size:0.8rem">Equity Curve</h3></div>
            <div style="padding:10px; height: 150px;"><canvas id="equityChart"></canvas></div>
        </div>
    </div>
</div>

<script>
    let globalData = null;
    let equityChart = null;

    async function loadData() {
        const res = await fetch('data.json?t=' + Date.now());
        globalData = await res.json();
        
        // Update Macro stats
        document.getElementById('vix-val').innerText = globalData.macro.vix;
        document.getElementById('yield-val').innerText = globalData.macro.treasury_10y + '%';
        document.getElementById('sync-status').innerText = "REFRESH: " + new Date(globalData.generated_at).toLocaleTimeString();
        
        const risk = document.getElementById('risk-status');
        risk.innerText = globalData.macro.vix > 22 ? 'CAUTION' : 'STABLE';
        risk.style.color = globalData.macro.vix > 22 ? '#dc2626' : '#16a34a';

        renderList();
        if (globalData.top_candidates.length > 0) selectStock(globalData.top_candidates[0].ticker);
    }

    function renderList() {
        const filter = document.getElementById('sector-filter').value;
        const container = document.getElementById('list-container');
        
        container.innerHTML = globalData.top_candidates
            .filter(c => filter === "ALL" || c.industry_group === filter)
            .map(c => `
                <div class="stock-card" id="card-${c.ticker}" onclick="selectStock('${c.ticker}')">
                    <div class="ticker-row">
                        <span class="ticker-name">${c.ticker}</span>
                        <div class="tags">
                            <span class="tag tag-group">${c.industry_group || 'General'}</span>
                            <span class="tag ${c.tier2?.recommended_action === 'BUY' ? 'tag-buy' : 'tag-hold'}">
                                ${c.tier2?.recommended_action || 'HOLD'}
                            </span>
                        </div>
                    </div>
                    <div class="metrics-grid">
                        <span>ROE: <b>${c.roe}%</b></span>
                        <span>PE: <b>${c.pe_ratio}</b></span>
                        <span>Debt/Eq: <b>${c.debt_to_equity}</b></span>
                        <span>Score: <b>${c.score}/10</b></span>
                    </div>
                </div>
            `).join('');
    }

    function selectStock(ticker) {
        const data = globalData.top_candidates.find(x => x.ticker === ticker);
        document.querySelectorAll('.stock-card').forEach(el => el.classList.remove('active'));
        const card = document.getElementById(`card-${ticker}`);
        if(card) card.classList.add('active');

        // TV Chart
        let symbol = ticker.includes('.AS') ? `EURONEXT:${ticker.split('.')[0]}` : ticker;
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "D", "timezone": "Etc/UTC",
            "theme": "light", "style": "1", "locale": "en", "container_id": "tv-container"
        });

        // Analysis
        document.getElementById('analysis-content').innerHTML = `
            <h4 style="margin:0 0 10px 0; color:var(--accent)">${data.name}</h4>
            <div style="font-family:'Roboto Mono'; font-size:0.75rem; background:#f1f5f9; padding:8px; border-radius:4px; margin-bottom:15px;">
                TARGET: €${data.tier2?.target_price || '—'} | ROE: ${data.roe}% | PE: ${data.pe_ratio}
            </div>
            <div style="white-space: pre-wrap;">${data.tier2?.analysis || 'Geen analyse.'}</div>
        `;
    }

    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>
