<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO | Portfolio Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg:       #f1f5f9;
            --surface:  #ffffff;
            --panel:    #ffffff;
            --border:   #e2e8f0;
            --border2:  #cbd5e1;
            --text:     #0f172a;
            --muted:    #64748b;
            --accent:   #2563eb;
            --green:    #059669;
            --red:      #dc2626;
            --yellow:   #d97706;
            --purple:   #7c3aed;
            --mono:     'JetBrains Mono', monospace;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 14px; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .logo {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 0.05em;
        }
        .logo span { color: var(--muted); font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        #clock {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--muted);
        }
        .live-dot {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── LAYOUT ── */
        .main-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 16px;
            padding: 16px;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 56px);
        }

        /* ── PANELS ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .panel:hover { box-shadow: var(--shadow-md); }
        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .panel-body { padding: 0; }

        /* ── LEFT COLUMN ── */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── RIGHT COLUMN ── */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── PORTFOLIO TOTAL BANNER ── */
        .portfolio-banner {
            background: #f0f7ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .banner-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .banner-value {
            font-family: var(--mono);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }
        .banner-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .banner-stat { text-align: right; }
        .banner-stat-label {
            font-size: 0.68rem;
            color: var(--muted);
            margin-bottom: 2px;
        }
        .banner-stat-value {
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 600;
        }

        /* ── STOCK LIST ── */
        .filter-bar {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: var(--bg); color: var(--text); }
        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .stock-list { max-height: 520px; overflow-y: auto; }
        .stock-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.12s;
        }
        .stock-row:last-child { border-bottom: none; }
        .stock-row:hover { background: #f8fafc; }
        .stock-row.active { background: #eff6ff; }
        .stock-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 700;
            flex-shrink: 0;
            color: var(--accent);
        }
        .stock-info { flex: 1; min-width: 0; }
        .stock-ticker {
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
        }
        .stock-name {
            font-size: 0.68rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stock-right { text-align: right; }
        .stock-price {
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text);
        }
        .stock-change {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
        }
        .pos { color: var(--green); }
        .neg { color: var(--red); }

        /* ── SECTOR BADGES ── */
        .sector-badge {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 2px 7px;
            border-radius: 4px;
        }
        .s-tech     { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .s-finance  { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .s-health   { background: #faf5ff; color: #6d28d9; border: 1px solid #ddd6fe; }
        .s-consumer { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .s-cyclical { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
        .s-energy   { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
        .s-materials{ background: #f7fee7; color: #3f6212; border: 1px solid #d9f99d; }
        .s-comm     { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .s-others   { background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }

        /* ── CHART AREA ── */
        .charts-row {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 16px;
        }
        .chart-panel { display: flex; flex-direction: column; }
        .chart-wrap {
            position: relative;
            flex: 1;
            min-height: 240px;
            padding: 16px;
        }
        .tradingview-wrap {
            height: 360px;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        /* ── HOLDINGS TABLE ── */
        .holdings-table {
            width: 100%;
            border-collapse: collapse;
        }
        .holdings-table th {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
        }
        .holdings-table th.r { text-align: right; }
        .holdings-table td {
            padding: 11px 16px;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .holdings-table td.r { text-align: right; font-family: var(--mono); font-size: 0.78rem; }
        .holdings-table tbody tr:last-child td { border-bottom: none; }
        .holdings-table tbody tr:hover { background: #f8fafc; }
        .holding-ticker { font-family: var(--mono); font-weight: 700; font-size: 0.82rem; }
        .holding-name { font-size: 0.68rem; color: var(--muted); }

        /* ── ALLOCATION CHART ── */
        .alloc-wrap {
            padding: 16px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .alloc-chart-container {
            position: relative;
            width: 180px;
            height: 180px;
            flex-shrink: 0;
        }
        .alloc-legend {
            flex: 1;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
        }
        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .legend-name { flex: 1; color: var(--text); }
        .legend-pct { font-family: var(--mono); font-weight: 600; color: var(--muted); }

        /* ── KPI CARDS ROW ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .kpi-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .kpi-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .kpi-value {
            font-family: var(--mono);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }
        .kpi-sub {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .kpi-bar-bg {
            height: 3px;
            background: var(--bg);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .kpi-bar-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* ── SCROLLBARS ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        /* ── LOADING ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.8rem;
            gap: 8px;
        }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MINI SPARKLINE ── */
        .sparkline { display: inline-block; vertical-align: middle; }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 300px 1fr; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .charts-row { grid-template-columns: 1fr; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .alloc-wrap { flex-direction: column; align-items: center; }
            .banner-value { font-size: 1.5rem; }
        }
        @media (max-width: 480px) {
            .main-grid { padding: 10px; gap: 10px; }
            .kpi-row { grid-template-columns: 1fr 1fr; }
            header { padding: 0 14px; }
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
    <div class="logo">NEXUS<span> PRO</span></div>
    <div class="header-right">
        <div id="clock"></div>
        <div class="live-dot" title="Live data"></div>
    </div>
</header>

<!-- ── MAIN ── -->
<div class="main-grid">

    <!-- ── LEFT: stock list ── -->
    <div class="left-col">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Holdings</span>
                <span id="holding-count" style="font-size:0.72rem;color:var(--muted);">—</span>
            </div>
            <div class="filter-bar" id="filter-bar">
                <button class="filter-btn active" data-sector="all">All</button>
            </div>
            <div class="stock-list" id="stock-list">
                <div class="loading"><div class="spinner"></div> Loading…</div>
            </div>
        </div>
    </div>

    <!-- ── RIGHT ── -->
    <div class="right-col">

        <!-- Portfolio banner -->
        <div class="portfolio-banner" id="portfolio-banner">
            <div>
                <div class="banner-label">Total Portfolio Value</div>
                <div class="banner-value" id="banner-total">—</div>
            </div>
            <div class="banner-meta" id="banner-meta"></div>
        </div>

        <!-- KPI row -->
        <div class="kpi-row" id="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">Total Invested</div>
                <div class="kpi-value" id="kpi-invested">—</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Unrealized P&amp;L</div>
                <div class="kpi-value" id="kpi-pnl">—</div>
                <div class="kpi-sub" id="kpi-pnl-pct"></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Positions</div>
                <div class="kpi-value" id="kpi-positions">—</div>
                <div class="kpi-sub">active holdings</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Best Performer</div>
                <div class="kpi-value" id="kpi-best" style="font-size:1rem;">—</div>
                <div class="kpi-sub" id="kpi-best-sub"></div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="charts-row">
            <!-- Equity chart -->
            <div class="panel chart-panel">
                <div class="panel-header">
                    <span class="panel-title">Equity Curve</span>
                    <span id="equity-ticker" style="font-family:var(--mono);font-size:0.75rem;color:var(--accent);font-weight:600;"></span>
                </div>
                <div class="chart-wrap">
                    <canvas id="equity-chart"></canvas>
                </div>
            </div>
            <!-- Allocation donut -->
            <div class="panel chart-panel">
                <div class="panel-header">
                    <span class="panel-title">Sector Allocation</span>
                </div>
                <div class="alloc-wrap" id="alloc-wrap">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- TradingView chart -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title" id="tv-panel-title">Select a stock</span>
                <span style="font-size:0.7rem;color:var(--muted);">TradingView</span>
            </div>
            <div class="tradingview-wrap" id="tv-container"></div>
        </div>

        <!-- Holdings table -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">Positions Detail</span>
            </div>
            <div style="overflow-x:auto;">
                <table class="holdings-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th class="r">Price</th>
                            <th class="r">Qty</th>
                            <th class="r">Value</th>
                            <th class="r">Cost</th>
                            <th class="r">P&amp;L</th>
                            <th class="r">P&amp;L %</th>
                            <th class="r">Weight</th>
                        </tr>
                    </thead>
                    <tbody id="holdings-body">
                        <tr><td colspan="8" class="loading">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /right-col -->
</div><!-- /main-grid -->

<script>
/* ═══════════════════════════════════════════════════════
   PORTFOLIO DATA  — edit to match your real positions
   ═══════════════════════════════════════════════════════ */
const PORTFOLIO = [
    { ticker:'NVDA',  name:'NVIDIA Corp',          qty:3,    avgCost:112.00, sector:'Tech & AI' },
    { ticker:'TSLA',  name:'Tesla Inc',             qty:2,    avgCost:180.00, sector:'Consumer Cyclical' },
    { ticker:'AAPL',  name:'Apple Inc',             qty:5,    avgCost:175.00, sector:'Tech & AI' },
    { ticker:'MSFT',  name:'Microsoft Corp',        qty:4,    avgCost:380.00, sector:'Tech & AI' },
    { ticker:'AMZN',  name:'Amazon.com Inc',        qty:3,    avgCost:185.00, sector:'Consumer Cyclical' },
    { ticker:'GOOGL', name:'Alphabet Inc',          qty:2,    avgCost:170.00, sector:'Communication' },
    { ticker:'META',  name:'Meta Platforms',        qty:3,    avgCost:500.00, sector:'Communication' },
    { ticker:'BRK.B', name:'Berkshire Hathaway B',  qty:5,    avgCost:370.00, sector:'Financials' },
    { ticker:'JNJ',   name:'Johnson & Johnson',     qty:4,    avgCost:152.00, sector:'Healthcare' },
    { ticker:'XOM',   name:'Exxon Mobil',           qty:6,    avgCost:105.00, sector:'Energy' },
];

const SECTOR_MAP = {
    'Tech & AI':          { cls:'s-tech',     color:'#2563eb', label:'TECH' },
    'Financials':         { cls:'s-finance',  color:'#d97706', label:'FIN'  },
    'Healthcare':         { cls:'s-health',   color:'#7c3aed', label:'HLTH' },
    'Consumer Staples':   { cls:'s-consumer', color:'#059669', label:'CONS' },
    'Consumer Cyclical':  { cls:'s-cyclical', color:'#ea580c', label:'CYCL' },
    'Energy':             { cls:'s-energy',   color:'#dc2626', label:'ENRG' },
    'Materials':          { cls:'s-materials',color:'#65a30d', label:'MAT'  },
    'Communication':      { cls:'s-comm',     color:'#1d4ed8', label:'COMM' },
    'Others':             { cls:'s-others',   color:'#64748b', label:'OTHR' },
};

/* ── live price cache ── */
let priceCache = {};
let equityChart = null;
let activeTicker = null;
let activeFilter = 'all';

/* ── clock ── */
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('nl-NL', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

/* ── fetch price for one ticker ── */
async function fetchPrice(ticker) {
    if (priceCache[ticker]?.ts > Date.now() - 60000) return priceCache[ticker];
    try {
        const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=30d`);
        const j = await r.json();
        const meta = j?.chart?.result?.[0]?.meta;
        const closes = j?.chart?.result?.[0]?.indicators?.quote?.[0]?.close || [];
        const price = meta?.regularMarketPrice || meta?.previousClose || 0;
        const prev  = meta?.previousClose || price;
        const change = prev ? ((price - prev) / prev) * 100 : 0;
        const hist = closes.filter(Boolean).slice(-20);
        priceCache[ticker] = { price, change, hist, ts: Date.now() };
        return priceCache[ticker];
    } catch {
        return { price: 0, change: 0, hist: [], ts: Date.now() };
    }
}

/* ── load all prices ── */
async function loadPrices() {
    await Promise.all(PORTFOLIO.map(p => fetchPrice(p.ticker)));
    renderAll();
    setTimeout(loadPrices, 120000);
}

/* ── sector utility ── */
function getSector(s) {
    return SECTOR_MAP[s] || SECTOR_MAP['Others'];
}

/* ── render stock list ── */
function renderStockList() {
    const list = document.getElementById('stock-list');
    const items = PORTFOLIO.filter(p => activeFilter === 'all' || p.sector === activeFilter);
    if (!items.length) { list.innerHTML = '<div class="loading">No results</div>'; return; }

    list.innerHTML = items.map(p => {
        const d = priceCache[p.ticker] || { price:0, change:0 };
        const sd = getSector(p.sector);
        const isActive = activeTicker === p.ticker;
        const chSign = d.change >= 0 ? '+' : '';
        return `<div class="stock-row${isActive?' active':''}" onclick="selectStock('${p.ticker}')">
            <div class="stock-icon" style="color:${sd.color};border-color:${sd.color}22;background:${sd.color}0d;">${sd.label}</div>
            <div class="stock-info">
                <div class="stock-ticker">${p.ticker}</div>
                <div class="stock-name">${p.name}</div>
            </div>
            <div class="stock-right">
                <div class="stock-price">$${d.price.toFixed(2)}</div>
                <div class="stock-change ${d.change>=0?'pos':'neg'}">${chSign}${d.change.toFixed(2)}%</div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('holding-count').textContent = `${items.length} holdings`;
}

/* ── render filter buttons ── */
function renderFilterBar() {
    const sectors = [...new Set(PORTFOLIO.map(p => p.sector))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = `<button class="filter-btn ${activeFilter==='all'?'active':''}" data-sector="all">All</button>` +
        sectors.map(s => {
            const sd = getSector(s);
            return `<button class="filter-btn ${activeFilter===s?'active':''}" data-sector="${s}">${sd.label}</button>`;
        }).join('');
    bar.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            activeFilter = btn.dataset.sector;
            renderFilterBar();
            renderStockList();
        });
    });
}

/* ── render portfolio banner & KPIs ── */
function renderPortfolioRight() {
    let totalValue = 0, totalCost = 0;
    let bestTicker = '', bestPct = -Infinity;

    PORTFOLIO.forEach(p => {
        const d = priceCache[p.ticker] || { price:0 };
        const value = d.price * p.qty;
        const cost  = p.avgCost * p.qty;
        totalValue += value;
        totalCost  += cost;
        const pct = cost ? ((value - cost) / cost) * 100 : 0;
        if (pct > bestPct) { bestPct = pct; bestTicker = p.ticker; }
    });

    const totalPL  = totalValue - totalCost;
    const totalPct = totalCost ? (totalPL / totalCost) * 100 : 0;

    document.getElementById('banner-total').textContent = '$' + totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    document.getElementById('banner-meta').innerHTML = `
        <div class="banner-stat">
            <div class="banner-stat-label">Day Change</div>
            <div class="banner-stat-value ${totalPL>=0?'pos':'neg'}">${totalPL>=0?'+':''} $${Math.abs(totalPL).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div class="banner-stat">
            <div class="banner-stat-label">P&L %</div>
            <div class="banner-stat-value ${totalPct>=0?'pos':'neg'}">${totalPct>=0?'+':''}${totalPct.toFixed(2)}%</div>
        </div>`;

    document.getElementById('kpi-invested').textContent = '$' + totalCost.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
    const plEl = document.getElementById('kpi-pnl');
    plEl.textContent = (totalPL>=0?'+':'') + '$' + Math.abs(totalPL).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
    plEl.style.color = totalPL>=0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('kpi-pnl-pct').textContent = (totalPct>=0?'+':'') + totalPct.toFixed(2) + '%';
    document.getElementById('kpi-positions').textContent = PORTFOLIO.length;
    document.getElementById('kpi-best').textContent = bestTicker;
    document.getElementById('kpi-best-sub').textContent = (bestPct>=0?'+':'') + bestPct.toFixed(2) + '%';
    document.getElementById('kpi-best-sub').style.color = bestPct>=0 ? 'var(--green)' : 'var(--red)';
}

/* ── render allocation donut ── */
function renderAllocation() {
    const sectors = {};
    let totalValue = 0;
    PORTFOLIO.forEach(p => {
        const d = priceCache[p.ticker] || { price:0 };
        const v = d.price * p.qty;
        sectors[p.sector] = (sectors[p.sector] || 0) + v;
        totalValue += v;
    });

    const labels = Object.keys(sectors);
    const values = labels.map(l => sectors[l]);
    const colors = labels.map(l => getSector(l).color);

    const wrap = document.getElementById('alloc-wrap');
    wrap.innerHTML = `
        <div class="alloc-chart-container">
            <canvas id="alloc-chart"></canvas>
        </div>
        <div class="alloc-legend" id="alloc-legend"></div>`;

    const ctx = document.getElementById('alloc-chart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff', hoverBorderWidth: 3 }] },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            cutout: '70%',
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#ffffff',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    titleColor: '#64748b',
                    bodyColor: '#0f172a',
                    callbacks: {
                        label: ctx => ` ${ctx.label}: ${totalValue ? ((ctx.raw/totalValue)*100).toFixed(1) : 0}%`
                    }
                }
            }
        }
    });

    const legendEl = document.getElementById('alloc-legend');
    legendEl.innerHTML = labels.map((l, i) => `
        <div class="legend-item">
            <div class="legend-dot" style="background:${colors[i]}"></div>
            <span class="legend-name">${l}</span>
            <span class="legend-pct">${totalValue ? ((values[i]/totalValue)*100).toFixed(1) : 0}%</span>
        </div>`).join('');
}

/* ── equity / line chart ── */
function renderChart(ticker) {
    const p = PORTFOLIO.find(h => h.ticker === ticker);
    const d = priceCache[ticker] || { hist:[], price:0 };
    if (!d.hist.length) return;

    const hist = d.hist;
    const isPos = hist[hist.length-1] >= hist[0];
    const lineCol = isPos ? '#059669' : '#dc2626';
    const fillCol = isPos ? 'rgba(5,150,105,0.08)' : 'rgba(220,38,38,0.07)';

    const labels = hist.map((_,i) => `D-${hist.length-1-i}`);

    if (equityChart) { equityChart.destroy(); equityChart = null; }

    const ctx = document.getElementById('equity-chart').getContext('2d');
    equityChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: ticker,
                data: hist,
                borderColor: lineCol,
                backgroundColor: fillCol,
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 4,
                fill: true,
                tension: 0.4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode:'index', intersect:false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#ffffff',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    titleColor: '#64748b',
                    bodyColor: '#0f172a',
                    callbacks: {
                        label: ctx => ` $${ctx.raw.toFixed(2)}`
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(226,232,240,0.8)' },
                    ticks: { color: '#94a3b8', maxTicksLimit: 6, font: { family: 'JetBrains Mono', size: 10 } }
                },
                y: {
                    position: 'right',
                    grid: { color: 'rgba(226,232,240,0.8)' },
                    ticks: {
                        color: '#94a3b8',
                        font: { family: 'JetBrains Mono', size: 10 },
                        callback: v => '$' + v.toFixed(0)
                    }
                }
            }
        }
    });

    document.getElementById('equity-ticker').textContent = ticker;
}

/* ── TradingView ── */
function selectStock(ticker) {
    activeTicker = ticker;
    renderStockList();
    renderChart(ticker);
    document.getElementById('tv-panel-title').textContent = ticker + ' — Live Chart';

    const container = document.getElementById('tv-container');
    container.innerHTML = '';

    new TradingView.widget({
        container_id: 'tv-container',
        symbol: ticker,
        interval: 'D',
        timezone: 'Europe/Amsterdam',
        theme: 'light',
        backgroundColor: '#ffffff',
        gridColor: 'rgba(226,232,240,0.8)',
        style: '1',
        locale: 'nl',
        toolbar_bg: '#f8fafc',
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        save_image: false,
        width: '100%',
        height: '360',
    });
}

/* ── holdings table ── */
function renderHoldingsTable() {
    let totalValue = 0;
    PORTFOLIO.forEach(p => {
        const d = priceCache[p.ticker] || { price:0 };
        totalValue += d.price * p.qty;
    });

    const rows = PORTFOLIO.map(p => {
        const d = priceCache[p.ticker] || { price:0, change:0 };
        const value = d.price * p.qty;
        const cost  = p.avgCost * p.qty;
        const pl    = value - cost;
        const plPct = cost ? (pl / cost) * 100 : 0;
        const weight = totalValue ? (value / totalValue) * 100 : 0;
        const sd = getSector(p.sector);
        return `<tr onclick="selectStock('${p.ticker}')" style="cursor:pointer;">
            <td>
                <div class="holding-ticker">${p.ticker}</div>
                <div class="holding-name">${p.name}</div>
            </td>
            <td class="r">$${d.price.toFixed(2)}</td>
            <td class="r">${p.qty}</td>
            <td class="r">$${value.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
            <td class="r">$${cost.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
            <td class="r" style="color:${pl>=0?'var(--green)':'var(--red)'};">${pl>=0?'+':''}$${Math.abs(pl).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
            <td class="r" style="color:${plPct>=0?'var(--green)':'var(--red)'};">${plPct>=0?'+':''}${plPct.toFixed(2)}%</td>
            <td class="r">${weight.toFixed(1)}%</td>
        </tr>`;
    });

    document.getElementById('holdings-body').innerHTML = rows.join('');
}

/* ── render all ── */
function renderAll() {
    renderStockList();
    renderPortfolioRight();
    renderAllocation();
    renderHoldingsTable();
    if (activeTicker) renderChart(activeTicker);
    else if (PORTFOLIO.length) renderChart(PORTFOLIO[0].ticker);
}

/* ── init ── */
renderFilterBar();
loadPrices();

/* select first on start */
setTimeout(() => {
    if (!activeTicker && PORTFOLIO.length) selectStock(PORTFOLIO[0].ticker);
}, 1500);
</script>
