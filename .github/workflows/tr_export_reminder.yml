name: Maandelijkse Portfolio Herinnering

on:
  schedule:
    - cron: "0 8 19 * *"   # Elke 19e van de maand, 08:00 UTC = 10:00 CEST / 09:00 CET
  workflow_dispatch:

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Stuur maandelijkse portfolio-herinnering via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, urllib.parse, json

          token   = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]

          msg = (
              "📅 *NEXUS Maandelijkse Herinnering*\n\n"
              "Het is de 19e — tijd om je portfolio\\-secrets bij te werken\\!\n\n"

              "━━━━━━━━━━━━━━━━━━━━\n"
              "🟠 *Trade Republic — TR\\_HOLDINGS*\n"
              "━━━━━━━━━━━━━━━━━━━━\n"
              "1\\. TR app → Profiel → Documenten → Transactie\\-export\n"
              "2\\. Tel nieuwe aankopen bij de aantallen op\n"
              "3\\. GitHub → Secrets → `TR_HOLDINGS` updaten\n\n"
              "_Huidig formaat \\(ISIN  aandelen  gem\\.prijs\\):_\n"
              "`BTC              0.0702790   60000`\n"
              "`IE00BK5BQT80     5.1854850   150.18`\n"
              "`IE00BK5BR626     2.3065390   86.71`\n"
              "`LU1681048804     5.9527900   117.59`\n"
              "`NL0011683594     15.2324020  52.52`\n\n"

              "━━━━━━━━━━━━━━━━━━━━\n"
              "🔵 *DEGIRO — DEGIRO\\_HOLDINGS*\n"
              "━━━━━━━━━━━━━━━━━━━━\n"
              "1\\. DEGIRO app → Activiteit → Transacties → exporteer indien nodig\n"
              "2\\. Controleer of aantallen nog kloppen \\(aankopen/verkopen\\/maand\\)\n"
              "3\\. GitHub → Secrets → `DEGIRO_HOLDINGS` updaten\n\n"
              "_Huidig formaat \\(ticker  aandelen  gem\\.prijs\\):_\n"
              "`VWRL\\.AS   39   119\\.31`\n"
              "`VUSA\\.AS   42   89\\.00`\n"
              "`VHYL\\.AS   56   62\\.98`\n"
              "`V          2    201\\.95`\n\n"

              "━━━━━━━━━━━━━━━━━━━━\n"
              "🟠 *BUX — BUX\\_TRANSACTIONS\\_CSV*\n"
              "━━━━━━━━━━━━━━━━━━━━\n"
              "1\\. BUX app → Profiel → Exporteer transacties\n"
              "2\\. GitHub → Secrets → `BUX_TRANSACTIONS_CSV` updaten \\(plak CSV\\)\n"
              "3\\. Aandelen \\+ gemiddelden worden automatisch berekend\n\n"

              "📊 Na updaten: run Morning Briefing handmatig om te controleren\\."
          )

          data = urllib.parse.urlencode({
              "chat_id":    chat_id,
              "text":       msg,
              "parse_mode": "MarkdownV2",
          }).encode()

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data, method="POST"
          )
          with urllib.request.urlopen(req, timeout=10) as r:
              result = json.loads(r.read())
              print("Verzonden:", result.get("ok"))
          EOF
