name: NEXUS Morning Briefing

on:
  schedule:
    - cron: "0 7 * * *"   # Elke dag 07:00 UTC = 09:00 CEST / 08:00 CET
  workflow_dispatch:

permissions:
  contents: write           # Nodig om portfolio-snapshots in memory.json te committen

jobs:
  morning_briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installeer dependencies
        run: |
          pip install yfinance anthropic requests pandas

      - name: Morning Briefing verzenden
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DEGIRO:               ${{ secrets.DEGIRO }}
          DEGIRO_HOLDINGS:      ${{ secrets.DEGIRO_HOLDINGS }}
          TR_HOLDINGS:          ${{ secrets.TR_HOLDINGS }}
          TR_TRANSACTIONS_CSV:  ${{ secrets.TR_TRANSACTIONS_CSV }}
          BUX_HOLDINGS:         ${{ secrets.BUX_HOLDINGS }}
        run: python src/morning_briefing.py

      - name: Sla portfolio-snapshot op (memory.json)
        run: |
          git config user.name  "NEXUS-MorningBot"
          git config user.email "nexus@bot.local"
          git add memory.json
          git diff --cached --quiet || git commit -m "Snapshot: portfolio $(date -u +'%Y-%m-%d')"
          git push

