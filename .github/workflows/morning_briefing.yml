name: NEXUS Morning Briefing

on:
  schedule:
    - cron: "0 7 * * *"   # Elke dag 07:00 UTC = 09:00 CEST (zomer) / 08:00 CET (winter)
  workflow_dispatch:        # Handmatig starten vanuit GitHub Actions UI

permissions:
  contents: read            # Alleen lezen — briefing schrijft niets terug

jobs:
  morning_briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installeer dependencies
        run: |
          pip install yfinance anthropic requests pandas
          # pytr voor Trade Republic (optioneel — installeert ook als TR_PHONE/TR_PIN niet gezet zijn)
          pip install pytr || echo "pytr niet beschikbaar — Trade Republic overgeslagen"

      - name: Morning Briefing verzenden
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── DEGIRO (optioneel) ───────────────────────────────────────────────
          # Zet deze secrets in: GitHub repo → Settings → Secrets → Actions
          DEGIRO_USERNAME:     ${{ secrets.DEGIRO_USERNAME }}
          DEGIRO_PASSWORD:     ${{ secrets.DEGIRO_PASSWORD }}
          DEGIRO_INT_ACCOUNT:  ${{ secrets.DEGIRO_INT_ACCOUNT }}
          # ── Trade Republic (optioneel) ───────────────────────────────────────
          # Vereist eenmalige lokale setup met SMS-verificatie (zie README)
          TR_PHONE:            ${{ secrets.TR_PHONE }}
          TR_PIN:              ${{ secrets.TR_PIN }}
        run: python src/morning_briefing.py
