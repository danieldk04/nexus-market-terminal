name: NEXUS AUTONOMOUS TRADING ENGINE

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scan_and_analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests anthropic lxml

      - name: Step 1: Run Tier 1 Scanner
        run: python src/tier1_scanner.py

      - name: Step 2: Run Tier 2 Analyser
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/tier2_analyser.py

      - name: Step 3: Evolution & Learning Logic
        run: python src/evolution_engine.py

      - name: Step 4: Commit and Push results
        run: |
          git config --global user.name "NEXUS-Bot"
          git config --global user.email "bot@nexus.terminal"
          git add data.json memory.json
          git commit -m "Auto-update: Autonomous Scan & Learning $(date +'%Y-%m-%d')" || exit 0
          git push
