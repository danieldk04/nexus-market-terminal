name: NEXUS Daily Scan

on:
  schedule:
    - cron: "0 7 * * 1-5" # Elke werkdag om 08:00 of 09:00 NL tijd
  workflow_dispatch:      # Zorgt voor de handmatige "Run" knop

jobs:
  scan_and_analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests anthropic lxml

      - name: Run Tier 1 Scanner
        run: python src/tier1_scanner.py

      - name: Run Tier 2 Analyser
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/tier2_analyser.py

      - name: Commit and Push results
        run: |
          git config --global user.name "NEXUS-Bot"
          git config --global user.email "bot@nexus.terminal"
          git add data.json memory.json
          git commit -m "Auto-update: Scan & Analysis $(date +'%Y-%m-%d')" || exit 0
          git push
