name: NEXUS AUTONOMOUS INVESTMENT ENGINE

on:
  schedule:
    - cron: "0 6,17 * * 1-5"   # Werkdagen 06:00 UTC (vóór briefing) + 17:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deep_value_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installeer dependencies
        run: pip install yfinance pandas numpy requests anthropic lxml

      - name: Tier 1 — Dual-Engine Scanner (S_Growth + S_Momentum + Convergence Zone)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/tier1_scanner.py

      - name: Tier 1.5 — SEC EDGAR Filing Agent (8-K / 10-K)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
        run: python src/filing_agent.py || echo "Filing agent mislukt — doorgaan"

      - name: Tier 2 — Bull vs Bear AI Analyser (Sonnet + DCF + Nieuws)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/tier2_analyser.py

      - name: Tier 3 — Evolution Engine (Kelly Criterion + DCF Exits)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/evolution_engine.py

      - name: Tier 3.4 — Backfill bootstrap (eenmalig — technische historie)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
        run: |
          # Bouwt de lookahead-vrije backtest-historie op ZODRA het logboek nog
          # geen backtest-rijen heeft. --if-empty maakt dit no-op op elke run
          # daarna, dus geen dagelijkse yfinance-download. Zonder deze historie
          # heeft de kalibratie geen data uit het verleden om op te leunen.
          python src/backfill_signals.py --if-empty --years 6 --step-days 5 \
            || echo "Backfill overgeslagen — doorgaan"

      - name: Tier 3.5 — Signal Logger (live signalen → nexus_signals.db)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
        run: python src/signal_logger.py || echo "Signal logger overgeslagen"

      - name: Tier 3.6 — Outcome Updater (realiseer verstreken horizons)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
        run: python src/update_outcomes.py || echo "Outcome updater overgeslagen"

      - name: Tier 4 — Post-Mortem Analyser (Self-Learning)
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/post_mortem.py || echo "Post-mortem overgeslagen"

      - name: Tier 5 — Weekly Evaluator (vrijdag — backtesting van voorspellingen)
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 17') }}
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          WEEKDAY=$(date -u +%u)
          if [ "$WEEKDAY" = "5" ]; then
            python src/weekly_evaluator.py || echo "Weekly evaluator overgeslagen"
          else
            echo "Niet vrijdag ($WEEKDAY) — weekly evaluator overgeslagen"
          fi

      - name: Tier 5.1 — Backtest-rapport verversen (walk-forward, voor Backtest-tab)
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 17') }}
        env:
          PYTHONPATH: src
          SILENT_RUN: "true"
        run: |
          # Genereert backtest_results.json (equity-curve strategie vs SPY) dat de
          # Backtest-tab in het dashboard toont. Alleen in het avond-/handmatige
          # venster zodat de dagelijkse scan niet vertraagt.
          python src/backtest_engine.py || echo "Backtest-rapport overgeslagen — doorgaan"

      - name: Commit & Push resultaten
        env:
          PYTHONPATH: src
        run: |
          set -e
          git config user.name  "NEXUS-InvestBot"
          git config user.email "nexus@bot.local"

          # Het leerlogboek is een binair SQLite-bestand: git kan het niet
          # regel-voor-regel mergen, dus '-X ours' zou de rijen van een andere
          # motor (lokale terminal / vorige push) botweg WISSEN. Daarom unioneren
          # we eerst origin's logboek IN het onze, zodat 'ours' altijd een
          # superset is en niemands historie verloren gaat. We proberen dit
          # race-veilig een paar keer.
          for attempt in 1 2 3; do
            git fetch origin || true

            # Union origin's laatste logboek er additief bij (geen clobber).
            git show origin/main:data/nexus_signals.db > /tmp/origin_signals.db 2>/dev/null || true
            if [ -s /tmp/origin_signals.db ]; then
              python src/signal_store.py --merge /tmp/origin_signals.db || echo "Merge overgeslagen"
            fi

            git add data.json memory.json data/nexus_signals.db backtest_results.json
            git diff --cached --quiet || git commit -m "Auto-update: Dual-Engine Scan $(date -u +'%Y-%m-%d %H:%M UTC')"

            # 'ours' bevat nu origin's rijen (via de union hierboven), dus deze
            # merge bewaart een superset i.p.v. te wissen. Voor data.json/
            # memory.json (tekst) lost -X ours de race deterministisch op.
            git merge origin/main -X ours --no-edit || true

            if git push; then
              echo "Push geslaagd (poging $attempt)."
              break
            fi
            echo "Push race verloren — opnieuw proberen ($attempt)."
            sleep 5
          done
