name: NEXUS AUTONOMOUS INVESTMENT ENGINE

on:
  schedule:
    - cron: "0 8,19 * * 1-5"   # Werkdagen 08:00 + 19:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deep_value_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installeer dependencies
        run: pip install yfinance pandas requests anthropic lxml

      - name: Tier 1 — Deep Value Scanner (ROIC + DCF + ROCE)
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/tier1_scanner.py

      - name: Tier 1.5 — SEC EDGAR Filing Agent (8-K / 10-K)
        env:
          PYTHONPATH: src
        run: python src/filing_agent.py || echo "Filing agent mislukt — doorgaan"

      - name: Tier 2 — Bull vs Bear AI Analyser (Sonnet + DCF + Nieuws)
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/tier2_analyser.py

      - name: Tier 3 — Evolution Engine (Kelly Criterion + DCF Exits)
        env:
          PYTHONPATH: src
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/evolution_engine.py

      - name: Tier 4 — Post-Mortem Analyser (Self-Learning)
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/post_mortem.py || echo "Post-mortem overgeslagen"

      - name: Tier 5 — Weekly Evaluator (vrijdag — backtesting van voorspellingen)
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 19') }}
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          WEEKDAY=$(date -u +%u)
          if [ "$WEEKDAY" = "5" ]; then
            python src/weekly_evaluator.py || echo "Weekly evaluator overgeslagen"
          else
            echo "Niet vrijdag ($WEEKDAY) — weekly evaluator overgeslagen"
          fi

      - name: Commit & Push resultaten
        run: |
          git config user.name  "NEXUS-InvestBot"
          git config user.email "nexus@bot.local"
          git add data.json memory.json
          git diff --cached --quiet || git commit -m "Auto-update: Deep Value Scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
