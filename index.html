<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS MARKET TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-cyan: #00fff9; --neon-magenta: #ff00ff; --dark-bg: #050812;
            --panel-bg: rgba(15, 23, 42, 0.9); --success-green: #00ff88;
            --danger-red: #ff1744; --grid-color: rgba(0, 255, 249, 0.05);
            --neon-orange: #ffaa00;
        }
        body {
            font-family: 'Rajdhani', sans-serif; background: var(--dark-bg);
            color: var(--neon-cyan); overflow-x: hidden;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        /* Header & Stats */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--panel-bg); border: 1px solid var(--neon-cyan);
            margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 255, 249, 0.2);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8em; letter-spacing: 2px; }
        .stats-bar { display: flex; gap: 25px; font-family: 'Share Tech Mono', monospace; }
        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2em; color: var(--neon-cyan); }
        
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: var(--panel-bg); border: 1px solid rgba(0, 255, 249, 0.2); padding: 20px; height: fit-content; margin-bottom: 20px; }
        .panel-title { font-family: 'Orbitron', sans-serif; font-size: 1em; margin-bottom: 15px; color: var(--neon-magenta); text-transform: uppercase; border-bottom: 1px solid rgba(255,0,255,0.2); padding-bottom: 5px;}
        
        /* Portfolio Table */
        .portfolio-table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono'; font-size: 0.85em; margin-top: 10px; }
        .portfolio-table th { text-align: left; color: #666; padding: 8px; border-bottom: 1px solid #333; }
        .portfolio-table td { padding: 8px; border-bottom: 1px solid #1a1a1a; }
        .pl-positive { color: var(--success-green); }
        .pl-negative { color: var(--danger-red); }

        /* Market Cards */
        .market-item { 
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 4px; 
            margin-bottom: 15px; border: 1px solid rgba(0, 255, 249, 0.1); 
            transition: 0.3s;
        }
        .market-item:hover { border-color: var(--neon-cyan); background: rgba(0, 255, 249, 0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .ticker-box h4 { font-size: 1.4em; color: #fff; }
        .action-badge { padding: 4px 12px; border-radius: 2px; font-weight: bold; font-family: 'Orbitron'; font-size: 0.8em; }
        
        .target-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(0,0,0,0.4); padding: 10px; margin: 10px 0; border-radius: 4px;
        }
        .target-val { font-size: 1.3em; font-family: 'Share Tech Mono'; }
        
        .analysis-text { font-size: 0.95em; color: #ccc; line-height: 1.6; margin-top: 10px; text-align: justify; }
        .meta-line { font-size: 0.8em; color: #666; margin-top: 10px; font-family: 'Share Tech Mono'; }

        .agent-line { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.9em; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success-green); box-shadow: 0 0 5px var(--success-green); }

        .risk-bar { height: 10px; background: #222; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .risk-fill { height: 100%; background: var(--success-green); transition: 1s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⬢ NEXUS TERMINAL</div>
            <div class="stats-bar">
                <div class="stat"><div class="stat-label">VIX</div><div class="stat-value" id="stat-vix">—</div></div>
                <div class="stat"><div class="stat-label">10Y YIELD</div><div class="stat-value" id="stat-treasury">—</div></div>
                <div class="stat"><div class="stat-label">S&P RSI</div><div class="stat-value" id="stat-rsi">—</div></div>
                <div class="stat"><div class="stat-label">FEAR/GREED</div><div class="stat-value" id="stat-fg">—</div></div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="main-col">
                <div class="panel" style="border-color: var(--neon-cyan);">
                    <h3 class="panel-title" style="color: var(--neon-cyan);">📈 Virtual Performance Tracker</h3>
                    <table class="portfolio-table">
                        <thead>
                            <tr>
                                <th>ASSET</th>
                                <th>ENTRY</th>
                                <th>CURRENT</th>
                                <th style="text-align: right;">P/L %</th>
                            </tr>
                        </thead>
                        <tbody id="trade-list">
                            <tr><td colspan="4" style="color:#444; padding:10px;">Initialising tracker...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="panel">
                    <h3 class="panel-title">🎯 Active Analysis & Price Targets</h3>
                    <div id="candidates-list"></div>
                </div>
            </div>

            <div class="side-col">
                <div class="panel">
                    <h3 class="panel-title">🤖 Agent Status</h3>
                    <div class="agent-line"><div class="status-dot"></div><div>Scanner: <span id="agent-t1">Online</span></div></div>
                    <div class="agent-line"><div class="status-dot"></div><div>Claude 4.6: <span id="agent-t2">Online</span></div></div>
                    <div class="agent-line"><div class="status-dot"></div><div>Memory: <span id="agent-mem">Sync</span></div></div>
                </div>

                <div class="panel">
                    <h3 class="panel-title">🛡 Risk Management</h3>
                    <div class="stat-label">Avg Conviction Score</div>
                    <div id="conv-val" style="font-size: 1.5em; margin: 5px 0;">0 / 10</div>
                    <div class="risk-bar"><div id="risk-fill" class="risk-fill" style="width: 0%"></div></div>
                    <div id="signals-summary" style="margin-top: 15px; font-family: 'Share Tech Mono'; font-size: 0.9em;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                return await res.json();
            } catch (e) { return null; }
        }

        function render(data) {
            // 1. Macro Indicators
            const m = data.macro || {};
            document.getElementById('stat-vix').innerText = m.vix || '—';
            const treasuryVal = m.treasury_10y || 0;
            document.getElementById('stat-treasury').innerText = (treasuryVal > 10 ? treasuryVal / 100 : treasuryVal).toFixed(2) + '%';
            document.getElementById('stat-rsi').innerText = m.rsi || m.sp500_rsi || '—';
            document.getElementById('stat-fg').innerText = data.fear_and_greed?.score || '50';

            // 2. Virtual Portfolio renderen
            const trades = data.active_trades || [];
            const tradeListEl = document.getElementById('trade-list');
            if (trades.length === 0) {
                tradeListEl.innerHTML = '<tr><td colspan="4" style="padding:10px; color:#444;">No active trades logged.</td></tr>';
            } else {
                tradeListEl.innerHTML = trades.map(t => {
                    const pl = t.pl_percent || 0;
                    const plClass = pl >= 0 ? 'pl-positive' : 'pl-negative';
                    const prefix = pl >= 0 ? '+' : '';
                    return `
                        <tr>
                            <td style="font-weight: bold; color: var(--neon-cyan);">${t.ticker}</td>
                            <td>€${t.entry_price}</td>
                            <td>€${t.current_price}</td>
                            <td style="text-align: right;" class="${plClass}">${prefix}${pl}%</td>
                        </tr>
                    `;
                }).join('');
            }

            // 3. Kandidatenlijst (Cards)
            const list = document.getElementById('candidates-list');
            const candidates = data.top_candidates || [];
            if (candidates.length === 0) {
                list.innerHTML = '<div class="empty-state">Geen actieve kandidaten gevonden.</div>';
            } else {
                list.innerHTML = candidates.map(c => {
                    const t2 = c.tier2 || {};
                    const action = (t2.recommended_action || 'HOLD').toUpperCase();
                    const color = action === 'BUY' ? 'var(--success-green)' : (action === 'AVOID' ? 'var(--danger-red)' : '#ffcc00');
                    const conviction = t2.conviction_score || t2.conviction || 0;
                    return `
                    <div class="market-item">
                        <div class="card-header">
                            <div class="ticker-box">
                                <h4>${c.ticker} <span style="font-size: 0.6em; color: #666;">${c.name || ''}</span></h4>
                                <div style="font-size: 0.8em; color: var(--neon-cyan); opacity: 0.7;">${c.sector || 'Equities'}</div>
                            </div>
                            <div class="action-badge" style="background: ${color}; color: #000;">${action}</div>
                        </div>
                        <div class="target-grid">
                            <div>
                                <div class="stat-label">30D Target</div>
                                <div class="target-val">€${t2.target_price || '—'}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="stat-label">Upside Potential</div>
                                <div class="target-val" style="color: ${color}">${t2.upside_percentage || 0}%</div>
                            </div>
                        </div>
                        <div class="analysis-text">${t2.analysis || 'Analysis pending...'}</div>
                        <div class="meta-line">
                            CONVICTION: ${conviction}/10 | SENTIMENT: ${t2.sentiment_score || 5}/10 | PE: ${c.pe_ratio || 'N/A'} | DIV: ${c.dividend_yield || 0}%
                        </div>
                    </div>`;
                }).join('');
            }

            // 4. Risk Management
            const scores = candidates.map(c => c.tier2?.conviction_score || c.tier2?.conviction || 0).filter(s => s > 0);
            const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : 0;
            const convValEl = document.getElementById('conv-val');
            const riskFillEl = document.getElementById('risk-fill');
            if (convValEl) convValEl.innerText = `${avg} / 10`;
            if (riskFillEl) riskFillEl.style.width = (avg * 10) + '%';
            
            const buys = candidates.filter(c => (c.tier2?.recommended_action || '').toLowerCase() === 'buy').length;
            const summaryEl = document.getElementById('signals-summary');
            if (summaryEl) summaryEl.innerHTML = `BUY SIGNALS: ${buys} | ASSETS SCANNED: ${candidates.length}`;

            // 5. Weekend-modus Status
            const isWeekend = [0, 6].includes(new Date().getDay());
            const agentT1 = document.getElementById('agent-t1');
            if (isWeekend && agentT1) {
                agentT1.innerHTML = 'OFFLINE • Weekend-modus (Nieuws-focus)';
                agentT1.style.color = 'var(--neon-orange)';
            }
        }

        async function init() {
            const data = await loadData();
            if (data) render(data);
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
